<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="theme-color" content="#0b1b3a" />
  <title>Subscriptions</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="stylesheet" href="styles/app.css" />
</head>
<body>
  <div id="a2hs-tip" hidden>
    <span>Install: tap <strong>Share → Add to Home Screen</strong> for the full app experience.</span>
    <button
      type="button"
      id="a2hs-dismiss"
      aria-label="Dismiss"
      onclick="var t=document.getElementById('a2hs-tip');t.hidden=true;try{localStorage.setItem('subtracker.a2hsDismissed','1');}catch(e){}return false;"
    >×</button>
  </div>
  <div id="app-root"></div>
  <div id="toast-root"></div>
  <script type="module" src="src/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('sw.js'));
    }
    (function () {
      try {
        var tip = document.getElementById('a2hs-tip');
        var KEY = 'subtracker.a2hsDismissed';
        var standalone = (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches) || window.navigator.standalone === true;
        var dismissed = false;
        try { dismissed = !!localStorage.getItem(KEY); } catch (e) {}
        if (!standalone && !dismissed) tip.hidden = false;
      } catch (e) { /* keep tip hidden if something explodes */ }
    })();
  </script>
</body>
</html>
